substitutions:
  sensor_update_interval: 10s
  current_limit: "10"
  timezone: "Europe/Warsaw"
  sntp_update_interval: 6h
  sntp_server_1: "0.pool.ntp.org"
  sntp_server_2: "1.pool.ntp.org"
  sntp_server_3: "2.pool.ntp.org"
esphome:
  name: ld2420-4
  friendly_name: LD2420-4

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: !secret ld2420-4-api-password
  reboot_timeout: 0s

ota:
  - platform: esphome
    password: !secret ld2420-4-ota-password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true
  min_auth_mode: WPA2
  output_power: 8.5
  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Ld2420-4 AP"
    password: !secret ld2420-4-ap-password

captive_portal:

uart:
  id: uart_ld2420
  tx_pin: GPIO17
  rx_pin: GPIO18
  baud_rate: 115200
  data_bits: 8
  parity: NONE
  stop_bits: 1

one_wire:
  - platform: gpio
    pin:
      number: GPIO14
      mode:
        input: true
        pullup: true  
number:
  - platform: ld2420
    presence_timeout:
      name: Limit czasu wykrywania obecności
    min_gate_distance:
      name: Minimalna odległość wykrywania
    max_gate_distance:
      name: Maksymalna odległość wykrywania

    gate_select:
      name: Wybierz bramkę do ustawienia
    still_threshold:
      name: Ustaw próg detekcji statycznej
    move_threshold:
      name: Ustaw próg detekcji podczas ruchu

    gate_move_sensitivity:
      name: Współczynnik czułości bramki dla ruchu
    gate_still_sensitivity:
      name: Współczynnik czułości bramki dla detekcji statycznej

    gate_0:
      move_threshold:
        name: Gate 0 Move Threshold
      still_threshold:
        name: Gate 0 Still Threshold
    gate_1:
      move_threshold:
        name: Gate 1 Move Threshold
      still_threshold:
        name: Gate 1 Still Threshold
 

ld2420:
sensor:
  - platform: ld2420
    moving_distance:
      name : Odległość od obiektu w ruchu      
  - platform: uptime
    name: Uptime
  - platform: wifi_signal
    name: WiFi RSSI
    update_interval: 30s
  - platform: dallas_temp
    name: "Temperatura"
    update_interval: 15s
    resolution: 12 
    filters:
      - sliding_window_moving_average:
          window_size: 4
          send_every: 1
      - round: 1
      - offset: 0.5
binary_sensor:
  - platform: ld2420
    has_target:
      name: Obecność
      filters:
        - delayed_on: 150ms
        - delayed_off: 3s

select:
  - platform: ld2420
    operating_mode:
      name: Tryb pracy

button:
  - platform: ld2420
    apply_config:
      name: Zapisz ustawienia
    factory_reset:
      name: Reset do wartości fabrycznej
    restart_module:
      name: Restart modułu
    revert_config:
      name: Cofnij ustawienia

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP"
      entity_category: diagnostic
    ssid:
      name: "SSID"
      entity_category: diagnostic
    mac_address:
      name: "MAC"
      entity_category: diagnostic

  - platform: template
    name: "Ostatnie uruchomienie"
    id: device_last_restart
    icon: mdi:clock
    entity_category: diagnostic
    
esp32_ble_tracker:
  scan_parameters:
    interval: 1100ms
    window: 110ms
    active: false

bluetooth_proxy:
  active: true

time:
  - platform: sntp
    id: sntp_time
    timezone: "${timezone}"
    update_interval: ${sntp_update_interval}
    servers:
      - "${sntp_server_1}"
      - "${sntp_server_2}"
      - "${sntp_server_3}"
    on_time_sync:
      then:
        - if:
            condition:
              lambda: 'return id(device_last_restart).state == "";'
            then:
              - text_sensor.template.publish:
                  id: device_last_restart
                  state: !lambda 'return id(sntp_time).now().strftime("%a %d %b %Y - %H:%M:%S");'
